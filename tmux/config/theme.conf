# Display
bg="#282C34"
fg="#DCDFE4"
red="#E06C75"
blue="#61AFEF"
cyan="#56B6C2"
green="#98C379"
magenta="#C678DD"
gray1="#5C6370"
gray2="#3E4452"

set -g @mode_indicator_prefix_prompt " WAIT #[default]#[fg=$green]"
set -g @mode_indicator_prefix_mode_style bg=$green,fg=$bg
set -g @mode_indicator_copy_prompt " COPY #[default]#[fg=$cyan]"
set -g @mode_indicator_copy_mode_style bg=$cyan,fg=$bg
set -g @mode_indicator_sync_prompt " SYNC #[default]#[fg=$red]"
set -g @mode_indicator_sync_mode_style bg=$red,fg=$bg
set -g @mode_indicator_empty_prompt " TMUX #[default]#[fg=$blue]"
set -g @mode_indicator_empty_mode_style bg=$gray2,fg=$blue
set -g status on
set -g status-position bottom
set -g status-left-length 90
set -g status-right-length 90
set -g status-style bg=$bg
set -g window-style fg=$fg,bg=$bg
set -g window-active-style fg=$fg,bg=$bg
set -g pane-border-style fg=$fg
set -g pane-active-border-style fg=$blue
set -g message-style bg=$magenta,fg=$bg
set -g mode-style bg=$cyan,fg=$bg

# Popup styling
set -g popup-style bg=$bg,fg=$fg
set -g popup-border-style fg=$blue
set -g popup-border-lines rounded
setw -g window-status-separator ""

# Formatting
set -g status-left "#{tmux_mode_indicator}"
set -g status-right ""
setw -g window-status-format " #[fg=$gray1]#I:#W#{?window_last_flag,-,#{?window_zoomed_flag,, }}#{?window_zoomed_flag,Z,}"
setw -g window-status-current-format " #[fg=$blue]#I:#W*#{?window_zoomed_flag,Z,}"
